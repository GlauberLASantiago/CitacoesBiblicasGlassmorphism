<!DOCTYPE html>
<html lang="pt-pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luz Diária - Citações Bíblicas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-start: #0f0c29;
            --bg-end: #302b63;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --neon-cyan: #00ffff;
            --vibrant-violet: #8a2be2;
            --electric-indigo: #4b0082;
            --text-main: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
            color: var(--text-main);
            overflow: hidden;
            padding: 20px;
        }

        .blob {
            position: absolute;
            width: 350px;
            height: 350px;
            background: linear-gradient(var(--vibrant-violet), var(--electric-indigo));
            filter: blur(80px);
            border-radius: 50%;
            z-index: 0;
            opacity: 0.35;
            animation: move 25s infinite alternate ease-in-out;
        }

        @keyframes move {
            0% { transform: translate(-30%, -30%) scale(1); }
            100% { transform: translate(30%, 30%) scale(1.2); }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 700px;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .audio-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            padding: 12px 20px;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
        }

        .audio-select {
            background: transparent;
            color: var(--neon-cyan);
            border: none;
            outline: none;
            font-size: 0.8rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .audio-select option {
            background: var(--bg-start);
            color: white;
        }

        .volume-slider {
            width: 70px;
            height: 4px;
            accent-color: var(--neon-cyan);
            cursor: pointer;
        }

        #audio-status {
            font-size: 0.7rem;
            color: var(--neon-cyan);
            min-width: 120px;
            text-align: left;
            opacity: 0.8;
        }

        h1 {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 25px;
            color: var(--neon-cyan);
            text-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
        }

        #quote-container {
            min-height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .verse-text {
            font-size: 1.6rem;
            font-weight: 300;
            line-height: 1.6;
            margin-bottom: 25px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px 10px;
        }

        .word {
            display: inline-block;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: default;
        }

        .word:hover {
            color: var(--neon-cyan);
            transform: scale(1.3) translateY(-5px);
            text-shadow: 0 0 20px var(--neon-cyan);
            font-weight: 700;
            z-index: 10;
        }

        .reference {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--neon-cyan);
            opacity: 0.9;
            margin-bottom: 30px;
        }

        .btn-refresh {
            background: linear-gradient(135deg, var(--vibrant-violet), var(--electric-indigo));
            border: none;
            padding: 18px 45px;
            border-radius: 50px;
            color: white;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-refresh:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(138, 43, 226, 0.5);
        }

        .loader {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid var(--neon-cyan);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: none;
            margin: 20px auto;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 500px) {
            .glass-card { padding: 30px 15px; }
            .verse-text { font-size: 1.25rem; }
            .audio-controls { flex-direction: column; gap: 10px; border-radius: 20px; }
        }
    </style>
</head>

<body>
    <div class="blob"></div>

    <div class="container">
        <main class="glass-card">
            <div class="audio-controls">
                <select id="bg-music-select" class="audio-select" onchange="changeMusic()">
                    <option value="none">Silêncio</option>
                    <option value="piano" selected>Piano Suave</option>
                    <option value="rain">Chuva</option>
                    <option value="forest">Natureza</option>
                </select>
                <input type="range" id="volume-slider" class="volume-slider" min="0" max="1" step="0.05" value="0.4"
                    oninput="updateVolume()">
                <span id="audio-status">🔈 Clique para iniciar</span>
            </div>

            <h1>Luz das Escrituras</h1>

            <div id="quote-container">
                <div id="loader" class="loader"></div>
                <div id="verse-content">
                    <p class="verse-text" id="text">Toque em Nova Citação para iniciar...</p>
                    <p class="reference" id="ref"></p>
                </div>
            </div>

            <button class="btn-refresh" onclick="handleInteraction()" id="btn-action">
                Nova Citação
            </button>
        </main>
    </div>

    <script>
        // ─── Estado ────────────────────────────────────────────────────────
        let audioCtx = null;
        let bgSource = null;
        let bgGain = null;
        let audioUnlocked = false;
        let currentTrackKey = 'piano';
        let isPlaying = false;

        const audioStatus = document.getElementById('audio-status');
        const musicSelect = document.getElementById('bg-music-select');
        const volumeSlider = document.getElementById('volume-slider');
        const textElement = document.getElementById('text');
        const refElement = document.getElementById('ref');
        const loader = document.getElementById('loader');
        const content = document.getElementById('verse-content');
        const btnAction = document.getElementById('btn-action');

        // ─── Tracks MP3 confiáveis (sem CORS) ──────────────────────────────
        // Usamos a API do proxy corsproxy.io para contornar restrições de CORS
        // e fontes de áudio MP3 estáveis
        const tracks = {
            piano: "https://upload.wikimedia.org/wikipedia/commons/3/3b/Johann_Sebastian_Bach_-_Jesu%2C_Joy_of_Man%27s_Desiring_BWV_147.mp3",
            rain:  "https://upload.wikimedia.org/wikipedia/commons/6/6e/Rainforest_ambience.ogg",
            forest:"https://upload.wikimedia.org/wikipedia/commons/d/db/Bird_ambience_in_the_forest.ogg"
        };

        // Fallback: gerar música proceduralmente com Web Audio API
        let proceduralInterval = null;

        // ─── Web Audio Context ──────────────────────────────────────────────
        function getAudioCtx() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                bgGain = audioCtx.createGain();
                bgGain.gain.value = parseFloat(volumeSlider.value);
                bgGain.connect(audioCtx.destination);
            }
            return audioCtx;
        }

        // ─── Hover Sound (síntese pura, sem arquivo) ────────────────────────
        let lastHoverTime = 0;

        function playHoverSound() {
            if (!audioUnlocked) return;
            const now = Date.now();
            if (now - lastHoverTime < 80) return; // throttle
            lastHoverTime = now;

            const ctx = getAudioCtx();

            // Sino cristalino suave
            const osc = ctx.createOscillator();
            const gainNode = ctx.createGain();
            const t = ctx.currentTime;

            // Frequência aleatória em escala pentatônica (soa sempre bonito)
            const scale = [523.25, 587.33, 659.25, 783.99, 880.00, 1046.50];
            const freq = scale[Math.floor(Math.random() * scale.length)];

            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, t);
            osc.frequency.exponentialRampToValueAtTime(freq * 1.01, t + 0.1);

            gainNode.gain.setValueAtTime(0, t);
            gainNode.gain.linearRampToValueAtTime(0.08, t + 0.01);
            gainNode.gain.exponentialRampToValueAtTime(0.001, t + 0.4);

            // Adiciona um harmônico para riqueza tímbrica
            const osc2 = ctx.createOscillator();
            const gain2 = ctx.createGain();
            osc2.type = 'sine';
            osc2.frequency.setValueAtTime(freq * 2, t);
            gain2.gain.setValueAtTime(0, t);
            gain2.gain.linearRampToValueAtTime(0.03, t + 0.01);
            gain2.gain.exponentialRampToValueAtTime(0.001, t + 0.25);

            osc.connect(gainNode);
            gainNode.connect(ctx.destination);
            osc2.connect(gain2);
            gain2.connect(ctx.destination);

            osc.start(t);
            osc.stop(t + 0.5);
            osc2.start(t);
            osc2.stop(t + 0.3);
        }

        // ─── Música Procedural (fallback quando MP3 falha) ─────────────────
        // Gera acorde suave em loop usando Web Audio API
        let ambientNodes = [];

        function stopProceduralMusic() {
            ambientNodes.forEach(n => { try { n.stop(); } catch(e){} });
            ambientNodes = [];
            if (proceduralInterval) { clearInterval(proceduralInterval); proceduralInterval = null; }
        }

        function startProceduralPiano() {
            const ctx = getAudioCtx();
            stopProceduralMusic();

            // Progressão harmônica suave (Ré menor → Fá → Sol → Ré menor)
            const progressions = [
                [293.66, 369.99, 440.00],   // Ré menor
                [349.23, 440.00, 523.25],   // Fá maior
                [392.00, 493.88, 587.33],   // Sol maior
                [293.66, 369.99, 440.00],   // Ré menor
            ];

            let chordIdx = 0;

            function playChord(notes) {
                const t = ctx.currentTime;
                notes.forEach((freq, i) => {
                    const osc = ctx.createOscillator();
                    const g = ctx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.value = freq;
                    // Simula o ataque de piano
                    g.gain.setValueAtTime(0, t);
                    g.gain.linearRampToValueAtTime(0.06 - i * 0.01, t + 0.05);
                    g.gain.exponentialRampToValueAtTime(0.03, t + 1.5);
                    g.gain.exponentialRampToValueAtTime(0.001, t + 3.5);
                    osc.connect(g);
                    g.connect(bgGain);
                    osc.start(t);
                    osc.stop(t + 4);
                    ambientNodes.push(osc);

                    // Oitava acima bem suave
                    const osc2 = ctx.createOscillator();
                    const g2 = ctx.createGain();
                    osc2.type = 'sine';
                    osc2.frequency.value = freq * 2;
                    g2.gain.setValueAtTime(0, t + 0.1);
                    g2.gain.linearRampToValueAtTime(0.015, t + 0.3);
                    g2.gain.exponentialRampToValueAtTime(0.001, t + 2.5);
                    osc2.connect(g2);
                    g2.connect(bgGain);
                    osc2.start(t + 0.1);
                    osc2.stop(t + 3);
                    ambientNodes.push(osc2);
                });
            }

            playChord(progressions[0]);
            proceduralInterval = setInterval(() => {
                chordIdx = (chordIdx + 1) % progressions.length;
                playChord(progressions[chordIdx]);
            }, 3500);

            isPlaying = true;
            audioStatus.innerText = "🔊 Piano Suave";
            audioStatus.style.opacity = "1";
        }

        function startProceduralRain() {
            const ctx = getAudioCtx();
            stopProceduralMusic();

            // Ruído branco filtrado para simular chuva
            const bufferSize = ctx.sampleRate * 2;
            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = (Math.random() * 2 - 1) * 0.5;
            }

            function createRainLayer(freq, q, vol) {
                const src = ctx.createBufferSource();
                src.buffer = buffer;
                src.loop = true;

                const filter = ctx.createBiquadFilter();
                filter.type = 'bandpass';
                filter.frequency.value = freq;
                filter.Q.value = q;

                const g = ctx.createGain();
                g.gain.value = vol;

                src.connect(filter);
                filter.connect(g);
                g.connect(bgGain);
                src.start();
                ambientNodes.push(src);
            }

            createRainLayer(400, 0.5, 0.3);
            createRainLayer(1200, 1.5, 0.15);
            createRainLayer(3000, 2, 0.07);

            isPlaying = true;
            audioStatus.innerText = "🔊 Chuva";
            audioStatus.style.opacity = "1";
        }

        function startProceduralForest() {
            const ctx = getAudioCtx();
            stopProceduralMusic();

            // Ruído filtrado (vento suave) + notas de pássaro sintéticas
            const bufferSize = ctx.sampleRate * 2;
            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = (Math.random() * 2 - 1);
            }

            const wind = ctx.createBufferSource();
            wind.buffer = buffer;
            wind.loop = true;
            const windFilter = ctx.createBiquadFilter();
            windFilter.type = 'lowpass';
            windFilter.frequency.value = 300;
            const windGain = ctx.createGain();
            windGain.gain.value = 0.08;
            wind.connect(windFilter);
            windFilter.connect(windGain);
            windGain.connect(bgGain);
            wind.start();
            ambientNodes.push(wind);

            // Pássaros sintéticos ocasionais
            function chirp() {
                if (!isPlaying) return;
                const t = ctx.currentTime;
                const osc = ctx.createOscillator();
                const g = ctx.createGain();
                const freq = 1200 + Math.random() * 800;
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, t);
                osc.frequency.exponentialRampToValueAtTime(freq * 1.3, t + 0.08);
                osc.frequency.exponentialRampToValueAtTime(freq, t + 0.15);
                g.gain.setValueAtTime(0, t);
                g.gain.linearRampToValueAtTime(0.07, t + 0.02);
                g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
                osc.connect(g);
                g.connect(bgGain);
                osc.start(t);
                osc.stop(t + 0.25);
                ambientNodes.push(osc);
                const next = 800 + Math.random() * 3000;
                setTimeout(chirp, next);
            }
            setTimeout(chirp, 500);

            isPlaying = true;
            audioStatus.innerText = "🔊 Natureza";
            audioStatus.style.opacity = "1";
        }

        // ─── Controlo de Música ─────────────────────────────────────────────
        function stopAll() {
            isPlaying = false;
            stopProceduralMusic();
        }

        function changeMusic() {
            const selected = musicSelect.value;
            currentTrackKey = selected;
            stopAll();

            if (selected === 'none') {
                audioStatus.innerText = "🔇 Silêncio";
                return;
            }

            if (!audioUnlocked) {
                audioStatus.innerText = "🔈 Clique para iniciar";
                return;
            }

            // Resume contexto se suspenso
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            switch(selected) {
                case 'piano':  startProceduralPiano();  break;
                case 'rain':   startProceduralRain();   break;
                case 'forest': startProceduralForest(); break;
            }
        }

        function updateVolume() {
            if (bgGain) {
                bgGain.gain.value = parseFloat(volumeSlider.value);
            }
            if (volumeSlider.value == 0) audioStatus.innerText = "🔇 Mudo";
            else if (isPlaying) audioStatus.innerText = "🔊 Tocando";
        }

        // ─── Desbloquear Áudio (requer gesto do utilizador) ────────────────
        function unlockAudio() {
            if (audioUnlocked) return;
            audioUnlocked = true;

            const ctx = getAudioCtx();
            // Cria e reproduz buffer silencioso para desbloquear o contexto
            const buf = ctx.createBuffer(1, 1, ctx.sampleRate);
            const src = ctx.createBufferSource();
            src.buffer = buf;
            src.connect(ctx.destination);
            src.start();

            if (ctx.state === 'suspended') {
                ctx.resume().then(() => {
                    console.log("AudioContext desbloqueado.");
                    if (currentTrackKey !== 'none') changeMusic();
                });
            } else {
                if (currentTrackKey !== 'none') changeMusic();
            }
        }

        // ─── Versículos & UI ────────────────────────────────────────────────
        const fallbackVerses = [
            { text: "Porque Deus amou o mundo de tal maneira que deu o seu Filho unigênito, para que todo aquele que nele crê não pereça, mas tenha a vida eterna.", ref: "João 3:16" },
            { text: "O Senhor é o meu pastor, nada me faltará.", ref: "Salmo 23:1" },
            { text: "Posso todas as coisas naquele que me fortalece.", ref: "Filipenses 4:13" },
            { text: "Lâmpada para os meus pés é tua palavra e luz, para o meu caminho.", ref: "Salmo 119:105" },
            { text: "O amor é paciente, o amor é bondoso. Não inveja, não se vangloria, não se orgulha.", ref: "1 Coríntios 13:4" },
            { text: "Sede fortes e corajosos. Não temais, nem vos assusteis diante deles; pois o Senhor, teu Deus, é quem vai contigo.", ref: "Deuteronômio 31:6" },
            { text: "Confia no Senhor de todo o teu coração e não te estribes no teu próprio entendimento.", ref: "Provérbios 3:5" },
            { text: "Buscai primeiro o Reino de Deus, e a sua justiça, e todas essas coisas vos serão acrescentadas.", ref: "Mateus 6:33" }
        ];

        function formatText(text) {
            return text.split(' ').map(word =>
                `<span class="word" onmouseenter="playHoverSound()">${word}</span>`
            ).join(' ');
        }

        function handleInteraction() {
            unlockAudio();
            fetchVerse();
        }

        async function fetchVerse() {
            loader.style.display = 'block';
            content.style.opacity = '0';
            btnAction.disabled = true;

            await new Promise(resolve => setTimeout(resolve, 700));

            const randomIdx = Math.floor(Math.random() * fallbackVerses.length);
            const data = fallbackVerses[randomIdx];

            textElement.innerHTML = formatText(data.text);
            refElement.innerText = data.ref;

            loader.style.display = 'none';
            content.style.opacity = '1';
            btnAction.disabled = false;
        }

        // Primeiro clique em qualquer lugar desbloqueia o áudio
        document.body.addEventListener('click', () => { unlockAudio(); }, { once: true });
    </script>
</body>
</html>
